name: deploy-poc

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "building-blocks/**"
      - "contracts/**"
      - "scripts/cloud/**"
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - "RealtimePixPlatform.slnx"
      - ".github/workflows/deploy-poc.yml"
  workflow_dispatch:
    inputs:
      reset_databases:
        description: "Discard all fictional POC data before applying migrations"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: deploy-poc
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build and deploy application
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: poc
    env:
      TF_INPUT: "0"
      TF_VAR_tfstate_resource_group_name: ${{ vars.TFSTATE_RESOURCE_GROUP }}
      TF_VAR_tfstate_storage_account_name: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
      TF_VAR_tfstate_container_name: ${{ vars.TFSTATE_CONTAINER }}
      VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.11.4
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Sign in with image-push identity
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_IMAGE_CLIENT_ID || vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Read foundation outputs
        id: foundation
        working-directory: infra/terraform/foundation
        shell: bash
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -backend-config="key=poc/foundation.tfstate" \
            -backend-config="use_azuread_auth=true"

          echo "acr_name=$(terraform output -raw acr_name)" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$(terraform output -raw acr_login_server)" >> "$GITHUB_OUTPUT"
          echo "resource_group_name=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"
          echo "postgres_fqdn=$(terraform output -raw postgres_fqdn)" >> "$GITHUB_OUTPUT"
          echo "postgres_server_name=$(terraform output -raw postgres_server_name)" >> "$GITHUB_OUTPUT"
          echo "postgres_entra_admin_name=$(terraform output -raw postgres_entra_admin_name)" >> "$GITHUB_OUTPUT"
          echo "servicebus_namespace_name=$(terraform output -raw servicebus_namespace_name)" >> "$GITHUB_OUTPUT"

      - name: Build and push application images
        shell: bash
        env:
          ACR_NAME: ${{ steps.foundation.outputs.acr_name }}
          ACR_LOGIN_SERVER: ${{ steps.foundation.outputs.acr_login_server }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          az acr login --name "$ACR_NAME"

          build_and_push() {
            local repository="$1"
            local dockerfile="$2"
            local image="$ACR_LOGIN_SERVER/realtime-pix/$repository:$IMAGE_TAG"
            docker build --file "$dockerfile" --tag "$image" .
            docker push "$image"
          }

          build_and_push api-gateway services/api-gateway/Dockerfile
          build_and_push identity-presence-service services/identity-presence-service/Dockerfile
          build_and_push bank-ledger-service services/bank-ledger-service/Dockerfile
          build_and_push transaction-service services/transaction-service/Dockerfile
          build_and_push realtime-events-service services/realtime-events-service/Dockerfile
          build_and_push bot-service services/bot-service/Dockerfile
          # Transitional image only: no traffic, min replicas zero, removed after one release.
          build_and_push wallet-ledger-service services/wallet-ledger-service/Dockerfile

      - name: Sign out image-push identity
        shell: bash
        run: az logout

      - name: Sign in with apply identity
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_APPLY_CLIENT_ID || vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Apply runtime application revision
        id: runtime
        working-directory: infra/terraform/runtime
        shell: bash
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -backend-config="key=poc/runtime.tfstate" \
            -backend-config="use_azuread_auth=true"

          terraform apply -auto-approve \
            -var="image_tag=${{ github.sha }}"

          echo "workload_identities=$(terraform output -json workload_identities | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "container_apps=$(terraform output -json active_container_app_names | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "api_url=$(terraform output -raw apim_api_url)" >> "$GITHUB_OUTPUT"
          echo "presence_hub_url=$(terraform output -raw presence_hub_url)" >> "$GITHUB_OUTPUT"
          echo "events_hub_url=$(terraform output -raw events_hub_url)" >> "$GITHUB_OUTPUT"

      - name: Install PostgreSQL client
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Temporarily allow runner IP to PostgreSQL
        id: runner_ip
        shell: bash
        run: |
          IP="$(curl --fail --silent --show-error https://api.ipify.org)"
          echo "ip=$IP" >> "$GITHUB_OUTPUT"
          az postgres flexible-server firewall-rule create \
            --resource-group "${{ steps.foundation.outputs.resource_group_name }}" \
            --server-name "${{ steps.foundation.outputs.postgres_server_name }}" \
            --name "github-actions-${{ github.run_id }}" \
            --start-ip-address "$IP" \
            --end-ip-address "$IP" \
            --only-show-errors \
            --output none

      - name: Configure Microsoft Entra database principals
        shell: bash
        env:
          PGHOST: ${{ steps.foundation.outputs.postgres_fqdn }}
          PGADMIN_USER: ${{ steps.foundation.outputs.postgres_entra_admin_name }}
          WORKLOAD_IDENTITIES_JSON: ${{ steps.runtime.outputs.workload_identities }}
        run: bash scripts/cloud/postgres-bootstrap-entra.sh

      - name: Reset disposable POC data
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.reset_databases == 'true' }}
        shell: bash
        env:
          PGHOST: ${{ steps.foundation.outputs.postgres_fqdn }}
          PGADMIN_USER: ${{ steps.foundation.outputs.postgres_entra_admin_name }}
          WORKLOAD_IDENTITIES_JSON: ${{ steps.runtime.outputs.workload_identities }}
        run: bash scripts/cloud/reset-postgres-schemas.sh

      - name: Apply five EF Core migration sets
        shell: bash
        env:
          PGHOST: ${{ steps.foundation.outputs.postgres_fqdn }}
          PGADMIN_USER: ${{ steps.foundation.outputs.postgres_entra_admin_name }}
          WORKLOAD_IDENTITIES_JSON: ${{ steps.runtime.outputs.workload_identities }}
        run: bash scripts/cloud/run-ef-migrations.sh

      - name: Restart active revisions after migrations
        shell: bash
        env:
          RESOURCE_GROUP: ${{ steps.foundation.outputs.resource_group_name }}
          CONTAINER_APPS_JSON: ${{ steps.runtime.outputs.container_apps }}
        run: |
          jq -r '.[]' <<< "$CONTAINER_APPS_JSON" | while read -r app; do
            revision="$(az containerapp show \
              --resource-group "$RESOURCE_GROUP" \
              --name "$app" \
              --query properties.latestRevisionName \
              --output tsv)"
            az containerapp revision restart \
              --resource-group "$RESOURCE_GROUP" \
              --name "$app" \
              --revision "$revision" \
              --only-show-errors \
              --output none
          done

      - name: Remove Service Bus default authorization rules
        shell: bash
        env:
          RG: ${{ steps.foundation.outputs.resource_group_name }}
          SERVICEBUS_NAMESPACE: ${{ steps.foundation.outputs.servicebus_namespace_name }}
        run: bash scripts/cloud/remove-servicebus-default-rules.sh

      - name: Run cloud Saga smoke tests
        id: smoke
        shell: bash
        env:
          API_BASE_URL: ${{ steps.runtime.outputs.api_url }}
        run: node scripts/cloud/smoke-e2e.mjs

      - name: Synchronize Vercel public environment
        if: ${{ env.VERCEL_API_TOKEN != '' }}
        working-directory: apps/web
        shell: bash
        env:
          API_URL: ${{ steps.runtime.outputs.api_url }}
          PRESENCE_HUB_URL: ${{ steps.runtime.outputs.presence_hub_url }}
          EVENTS_HUB_URL: ${{ steps.runtime.outputs.events_hub_url }}
          VERCEL_PROJECT_NAME: realtime-pix-web
        run: |
          npx vercel link --yes --project "$VERCEL_PROJECT_NAME" --token "$VERCEL_API_TOKEN"

          sync_env() {
            local key="$1" value="$2" target="$3"
            npx vercel env rm "$key" "$target" --yes --token "$VERCEL_API_TOKEN" >/dev/null 2>&1 || true
            printf '%s\n' "$value" | npx vercel env add "$key" "$target" --token "$VERCEL_API_TOKEN"
          }

          for target in production preview; do
            sync_env NEXT_PUBLIC_API_BASE_URL "$API_URL" "$target"
            sync_env NEXT_PUBLIC_PRESENCE_HUB_URL "$PRESENCE_HUB_URL" "$target"
            sync_env NEXT_PUBLIC_EVENTS_HUB_URL "$EVENTS_HUB_URL" "$target"
          done

      - name: Dump Container Apps diagnostics
        if: failure() && steps.runtime.outcome != 'skipped'
        shell: bash
        env:
          RESOURCE_GROUP: ${{ steps.foundation.outputs.resource_group_name }}
        run: |
          az containerapp list \
            --resource-group "$RESOURCE_GROUP" \
            --query "[].{name:name,state:properties.provisioningState,status:properties.runningStatus,revision:properties.latestRevisionName}" \
            --output table || true
          for app in $(az containerapp list --resource-group "$RESOURCE_GROUP" --query "[].name" --output tsv); do
            echo "::group::${app} logs"
            az containerapp logs show --resource-group "$RESOURCE_GROUP" --name "$app" --tail 120 --format text --follow false || true
            echo "::endgroup::"
          done

      - name: Remove temporary PostgreSQL firewall rule
        if: always() && steps.runner_ip.outputs.ip != ''
        shell: bash
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group "${{ steps.foundation.outputs.resource_group_name }}" \
            --server-name "${{ steps.foundation.outputs.postgres_server_name }}" \
            --name "github-actions-${{ github.run_id }}" \
            --yes \
            --only-show-errors \
            --output none
