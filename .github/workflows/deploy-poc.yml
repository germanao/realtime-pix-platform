name: deploy-poc

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      apply_runtime:
        description: "Apply runtime after building images"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      reset_databases:
        description: "Drop and recreate service database schemas before migrations"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy POC
    runs-on: ubuntu-latest
    environment: poc
    env:
      VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Apply foundation
        working-directory: infra/terraform/foundation
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -backend-config="key=foundation-poc.tfstate" \
            -backend-config="use_azuread_auth=true"
          terraform apply -auto-approve \
            -var="tfstate_resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -var="tfstate_storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -var="tfstate_container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -var="publisher_email=${{ vars.PUBLISHER_EMAIL }}"

      - name: Read foundation outputs
        id: foundation
        working-directory: infra/terraform/foundation
        shell: bash
        run: |
          echo "acr_name=$(terraform output -raw acr_name)" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$(terraform output -raw acr_login_server)" >> "$GITHUB_OUTPUT"
          echo "resource_group_name=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"
          echo "postgres_fqdn=$(terraform output -raw postgres_fqdn)" >> "$GITHUB_OUTPUT"
          echo "postgres_server_name=$(terraform output -raw postgres_server_name)" >> "$GITHUB_OUTPUT"
          echo "postgres_admin_login=$(terraform output -raw postgres_admin_login)" >> "$GITHUB_OUTPUT"
          echo "key_vault_name=$(terraform output -raw key_vault_name)" >> "$GITHUB_OUTPUT"
          echo "servicebus_namespace_name=$(terraform output -raw servicebus_namespace_name)" >> "$GITHUB_OUTPUT"

      - name: Install PostgreSQL client
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Temporarily allow runner IP to PostgreSQL
        id: runner_ip
        shell: bash
        run: |
          IP="$(curl -sS https://api.ipify.org)"
          echo "ip=$IP" >> "$GITHUB_OUTPUT"
          az postgres flexible-server firewall-rule create \
            --resource-group "${{ steps.foundation.outputs.resource_group_name }}" \
            --server-name "${{ steps.foundation.outputs.postgres_server_name }}" \
            --name "github-actions-${{ github.run_id }}" \
            --start-ip-address "$IP" \
            --end-ip-address "$IP"

      - name: Bootstrap PostgreSQL roles, permissions, and connection secrets
        shell: bash
        env:
          PGHOST: ${{ steps.foundation.outputs.postgres_fqdn }}
          PGADMIN_USER: ${{ steps.foundation.outputs.postgres_admin_login }}
          KEYVAULT_NAME: ${{ steps.foundation.outputs.key_vault_name }}
        run: bash scripts/cloud/postgres-bootstrap-noninteractive.sh

      - name: Reset PostgreSQL schemas
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.reset_databases == 'true' }}
        shell: bash
        env:
          PGHOST: ${{ steps.foundation.outputs.postgres_fqdn }}
          KEYVAULT_NAME: ${{ steps.foundation.outputs.key_vault_name }}
        run: bash scripts/cloud/reset-postgres-schemas.sh

      - name: Apply EF Core migrations
        shell: bash
        env:
          KEYVAULT_NAME: ${{ steps.foundation.outputs.key_vault_name }}
        run: bash scripts/cloud/run-ef-migrations.sh

      - name: Remove Service Bus default rules
        shell: bash
        env:
          RG: ${{ steps.foundation.outputs.resource_group_name }}
          SERVICEBUS_NAMESPACE: ${{ steps.foundation.outputs.servicebus_namespace_name }}
        run: bash scripts/cloud/remove-servicebus-default-rules.sh

      - name: Build service images in ACR
        shell: bash
        run: |
          ACR="${{ steps.foundation.outputs.acr_name }}"
          ACR_LOGIN_SERVER="${{ steps.foundation.outputs.acr_login_server }}"
          TAG="${{ github.sha }}"
          az acr login --name "$ACR"

          docker build --file services/api-gateway/Dockerfile --tag "$ACR_LOGIN_SERVER/realtime-pix/api-gateway:$TAG" .
          docker push "$ACR_LOGIN_SERVER/realtime-pix/api-gateway:$TAG"

          docker build --file services/identity-presence-service/Dockerfile --tag "$ACR_LOGIN_SERVER/realtime-pix/identity-presence-service:$TAG" .
          docker push "$ACR_LOGIN_SERVER/realtime-pix/identity-presence-service:$TAG"

          docker build --file services/wallet-ledger-service/Dockerfile --tag "$ACR_LOGIN_SERVER/realtime-pix/wallet-ledger-service:$TAG" .
          docker push "$ACR_LOGIN_SERVER/realtime-pix/wallet-ledger-service:$TAG"

          docker build --file services/transaction-service/Dockerfile --tag "$ACR_LOGIN_SERVER/realtime-pix/transaction-service:$TAG" .
          docker push "$ACR_LOGIN_SERVER/realtime-pix/transaction-service:$TAG"

          docker build --file services/realtime-events-service/Dockerfile --tag "$ACR_LOGIN_SERVER/realtime-pix/realtime-events-service:$TAG" .
          docker push "$ACR_LOGIN_SERVER/realtime-pix/realtime-events-service:$TAG"

          docker build --file services/bot-service/Dockerfile --tag "$ACR_LOGIN_SERVER/realtime-pix/bot-service:$TAG" .
          docker push "$ACR_LOGIN_SERVER/realtime-pix/bot-service:$TAG"

      - name: Apply runtime
        id: runtime_apply
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.apply_runtime == 'true' }}
        working-directory: infra/terraform/runtime
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -backend-config="key=runtime-poc.tfstate" \
            -backend-config="use_azuread_auth=true"
          terraform apply -auto-approve \
            -var="tfstate_resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -var="tfstate_storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -var="tfstate_container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -var="image_tag=${{ github.sha }}"

      - name: Sync Vercel frontend environment
        if: ${{ (github.event_name != 'workflow_dispatch' || inputs.apply_runtime == 'true') && env.VERCEL_API_TOKEN != '' }}
        working-directory: infra/terraform/runtime
        shell: bash
        env:
          VERCEL_PROJECT_NAME: realtime-pix-web
        run: |
          API_URL="$(terraform output -raw apim_api_url)"
          PRESENCE_HUB_URL="$(terraform output -raw presence_hub_url)"
          EVENTS_HUB_URL="$(terraform output -raw events_hub_url)"

          cd ../../../apps/web
          npx vercel link --yes --project "$VERCEL_PROJECT_NAME" --token "$VERCEL_API_TOKEN"

          sync_env() {
            local key="$1"
            local value="$2"
            local target="$3"

            npx vercel env rm "$key" "$target" --yes --token "$VERCEL_API_TOKEN" >/dev/null 2>&1 || true
            if [[ "$target" == "preview" ]]; then
              printf "%s\n" "$value" | npx vercel env add "$key" "$target" "" --token "$VERCEL_API_TOKEN"
            else
              printf "%s\n" "$value" | npx vercel env add "$key" "$target" --token "$VERCEL_API_TOKEN"
            fi
          }

          for target in production preview; do
            sync_env NEXT_PUBLIC_API_BASE_URL "$API_URL" "$target"
            sync_env NEXT_PUBLIC_PRESENCE_HUB_URL "$PRESENCE_HUB_URL" "$target"
            sync_env NEXT_PUBLIC_EVENTS_HUB_URL "$EVENTS_HUB_URL" "$target"
          done

      - name: Smoke test
        id: smoke_test
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.apply_runtime == 'true' }}
        working-directory: infra/terraform/runtime
        shell: bash
        run: |
          API_URL="$(terraform output -raw apim_api_url)"
          echo "Running cloud smoke tests against ${API_URL}"
          API_BASE_URL="$API_URL" node ../../../scripts/cloud/smoke-e2e.mjs

      - name: Dump Container Apps diagnostics
        if: ${{ failure() && (github.event_name != 'workflow_dispatch' || inputs.apply_runtime == 'true') && (steps.runtime_apply.outcome == 'failure' || steps.smoke_test.outcome == 'failure') }}
        shell: bash
        run: |
          RG="${{ steps.foundation.outputs.resource_group_name }}"

          echo "::group::Container Apps"
          az containerapp list \
            --resource-group "$RG" \
            --query "[].{name:name, provisioningState:properties.provisioningState, runningStatus:properties.runningStatus, fqdn:properties.configuration.ingress.fqdn, latestRevision:properties.latestRevisionName}" \
            --output table || true
          echo "::endgroup::"

          for app in $(az containerapp list --resource-group "$RG" --query "[].name" --output tsv); do
            echo "::group::${app} revisions"
            az containerapp revision list \
              --resource-group "$RG" \
              --name "$app" \
              --query "[].{name:name, active:properties.active, trafficWeight:properties.trafficWeight, healthState:properties.healthState, provisioningState:properties.provisioningState, createdTime:properties.createdTime}" \
              --output table || true
            echo "::endgroup::"
          done

      - name: Remove temporary PostgreSQL firewall rule
        if: always() && steps.runner_ip.outputs.ip != ''
        shell: bash
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group "${{ steps.foundation.outputs.resource_group_name }}" \
            --server-name "${{ steps.foundation.outputs.postgres_server_name }}" \
            --name "github-actions-${{ github.run_id }}" \
            --yes
