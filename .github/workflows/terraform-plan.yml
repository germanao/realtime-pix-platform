name: terraform-plan

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform-plan.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  static-validation:
    name: Static Terraform validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.4
      - run: terraform fmt -check -recursive infra/terraform
      - working-directory: infra/terraform/bootstrap
        run: |
          terraform init -backend=false
          terraform validate
      - working-directory: infra/terraform/foundation
        run: |
          terraform init -backend=false
          terraform validate
      - working-directory: infra/terraform/runtime
        run: |
          terraform init -backend=false
          terraform validate

  trusted-plan:
    name: Trusted Azure plan
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: poc
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.4
      - name: Foundation plan
        working-directory: infra/terraform/foundation
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -backend-config="key=foundation-poc.tfstate" \
            -backend-config="use_azuread_auth=true"
          terraform plan \
            -var="tfstate_resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -var="tfstate_storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -var="tfstate_container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -var="publisher_email=${{ vars.PUBLISHER_EMAIL }}"
      - name: Runtime plan
        working-directory: infra/terraform/runtime
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -backend-config="key=runtime-poc.tfstate" \
            -backend-config="use_azuread_auth=true"
          terraform plan \
            -var="tfstate_resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -var="tfstate_storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -var="tfstate_container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -var="image_tag=${{ github.sha }}" \
            -var="manage_vercel=false"
